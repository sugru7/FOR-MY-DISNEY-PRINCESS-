<!DOCTYPE html>
<html>
<head>
  <title>I Love You So Much</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff6b9d, #ffc3a0);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.2);
      padding: 40px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 500px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    p {
      font-size: 22px;
      line-height: 1.5;
    }

    .heart {
      font-size: 70px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>I love you</h1>
    <p>
      You mean so much to me, and I just wanted to make this little website
      to remind you 
      how special you are.
      <a href="more.html" style="
  display: inline-block;
  margin-top: 25px;
  background: white;
  color: #ff4f81;
  padding: 12px 24px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  font-size: 18px;
">
  Click here for more 
</a>
  </div>
</body>
</html>
